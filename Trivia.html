<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia IA Conversacional</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .card {
      border-radius: 20px;
      padding: 20px;
      max-width: 500px;
      width: 100%;
      background: rgba(0,0,0,0.75);
    }
    .btn-option {
      width: 100%;
      margin: 8px 0;
      text-align: left;
      border-radius: 12px;
    }
    .correct { background-color: #28a745 !important; }
    .incorrect { background-color: #dc3545 !important; }

    .timer-bar {
      height: 8px;
      background: #ffc107;
      transition: width 1s linear;
    }
  </style>
</head>
<body>

<div class="card text-center">
  <h4>🤖 Trivia IA</h4>

  <div class="progress mb-2">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <div class="progress mb-3">
    <div id="timerBar" class="timer-bar"></div>
  </div>

  <h5 id="question">Cargando...</h5>
  <div id="answers" class="mt-3"></div>

  <p class="mt-3">⏱ Tiempo: <span id="time">10</span>s</p>
  <p>Puntaje: <span id="score">0</span></p>

  <button id="nextBtn" class="btn btn-light mt-2" style="display:none;">Siguiente</button>
</div>

<script>
// ---------- SHUFFLE ROBUSTO (Fisher-Yates) ----------
function shuffle(arr) {
  let array = [...arr];
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// ---------- PREGUNTAS BASE ----------
let baseQuestions = [
  {
    q: "¿Qué es un modelo de lenguaje?",
    a: ["Un robot físico", "Predicción de texto", "Un antivirus", "Un CPU"],
    c: 1
  },
  {
    q: "¿Qué significa LLM?",
    a: ["Large Language Model", "Low Logic Machine", "Linear Model", "Language Memory"],
    c: 0
  },
  {
    q: "¿Qué es un token?",
    a: ["Unidad de texto", "Una imagen", "RAM", "Un virus"],
    c: 0
  }
];

// ---------- GENERADOR DINÁMICO CORREGIDO ----------
function generateDynamicQuestions() {
  const concepts = [
    ["prompt", "instrucción al modelo"],
    ["fine-tuning", "entrenamiento adicional"],
    ["hallucination", "respuesta incorrecta inventada"],
    ["embedding", "representación vectorial"]
  ];

  return concepts.map(c => {
    const answers = [
      c[1],
      "Un hardware",
      "Un lenguaje de programación",
      "Un virus"
    ];

    const shuffled = shuffle(answers);

    return {
      q: `¿Qué significa "${c[0]}" en IA?`,
      a: shuffled,
      c: shuffled.indexOf(c[1])
    };
  });
}

// ---------- ESTADO ----------
let quiz = [];
let current = 0;
let score = 0;
let timeLeft = 10;
let timer;

// ---------- ELEMENTOS ----------
const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const scoreEl = document.getElementById("score");
const nextBtn = document.getElementById("nextBtn");
const progressBar = document.getElementById("progressBar");
const timerBar = document.getElementById("timerBar");
const timeEl = document.getElementById("time");

// ---------- INICIALIZACIÓN SEGURA ----------
function initQuiz() {
  quiz = shuffle([...baseQuestions, ...generateDynamicQuestions()]);
  current = 0;
  score = 0;
  scoreEl.textContent = score;
  loadQuestion();
}

// ---------- CARGA DE PREGUNTA ----------
function loadQuestion() {
  resetTimer();
  nextBtn.style.display = "none";
  answersEl.innerHTML = "";

  const q = quiz[current];

  if (!q) {
    showResult();
    return;
  }

  questionEl.textContent = q.q;
  progressBar.style.width = ((current / quiz.length) * 100) + "%";

  q.a.forEach((answer, index) => {
    const btn = document.createElement("button");
    btn.className = "btn btn-outline-light btn-option";
    btn.textContent = answer;
    btn.onclick = () => selectAnswer(btn, index);
    answersEl.appendChild(btn);
  });

  startTimer();
}

// ---------- TIMER ----------
function startTimer() {
  timeLeft = 10;
  timeEl.textContent = timeLeft;
  timerBar.style.width = "100%";

  timer = setInterval(() => {
    timeLeft--;
    timeEl.textContent = timeLeft;
    timerBar.style.width = (timeLeft * 10) + "%";

    if (timeLeft <= 0) {
      clearInterval(timer);
      autoFail();
    }
  }, 1000);
}

function resetTimer() {
  clearInterval(timer);
}

// ---------- RESPUESTAS ----------
function autoFail() {
  const correct = quiz[current].c;
  const buttons = document.querySelectorAll(".btn-option");

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add("correct");
  });

  nextBtn.style.display = "block";
}

function selectAnswer(btn, index) {
  clearInterval(timer);

  const correct = quiz[current].c;
  const buttons = document.querySelectorAll(".btn-option");

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add("correct");
    if (i === index && i !== correct) b.classList.add("incorrect");
  });

  if (index === correct) score++;

  scoreEl.textContent = score;
  nextBtn.style.display = "block";
}

// ---------- NAVEGACIÓN ----------
nextBtn.onclick = () => {
  current++;
  if (current < quiz.length) {
    loadQuestion();
  } else {
    showResult();
  }
};

// ---------- RESULTADO ----------
function showResult() {
  progressBar.style.width = "100%";
  questionEl.textContent = "🎉 Fin del juego";
  answersEl.innerHTML = `
    <p>Tu puntaje: ${score} / ${quiz.length}</p>
    <button class="btn btn-success mt-2" onclick="initQuiz()">Reiniciar</button>
  `;
  nextBtn.style.display = "none";
}

// ---------- START ----------
initQuiz();
</script>

</body>
</html>
