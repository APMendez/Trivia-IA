<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia IA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body {
      background: #0f172a; /* azul oscuro */
      color: #e2e8f0; /* texto claro */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    h4 {
      color: #38bdf8; /* celeste */
    }

    .btn-option {
      width: 100%;
      margin: 8px 0;
      text-align: left;
      border-radius: 10px;
      border: 1px solid #334155;
      color: #e2e8f0;
    }

    .btn-option:hover {
      background: #334155;
    }

    .correct {
      background-color: #22c55e !important;
      color: white;
    }

    .incorrect {
      background-color: #ef4444 !important;
      color: white;
    }

    .timer-bar {
      height: 8px;
      background: #f59e0b;
      transition: width 1s linear;
    }

    .progress {
      background: #334155;
    }

    #feedback {
      margin-top: 10px;
      font-size: 0.95rem;
    }

    .correct-text {
      color: #22c55e;
    }
  </style>
</head>
<body>

<div class="card text-center">
  <h4>🤖 Trivia IA</h4>

  <div class="progress mb-2">
    <div id="progressBar" class="progress-bar bg-info"></div>
  </div>

  <div class="progress mb-3">
    <div id="timerBar" class="timer-bar"></div>
  </div>

  <h5 id="question">Cargando...</h5>
  <div id="answers" class="mt-3"></div>

  <div id="feedback"></div>

  <p class="mt-3">⏱ Tiempo: <span id="time">10</span>s</p>
  <p>Puntaje: <span id="score">0</span></p>

  <button id="nextBtn" class="btn btn-light mt-2" style="display:none;">Siguiente</button>
</div>

<script>
// ---------- SHUFFLE ----------
function shuffle(arr) {
  let array = [...arr];
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// ---------- BASE ----------
let baseQuestions = [
  {
    q: "¿Qué es un modelo de lenguaje?",
    a: ["Un robot físico", "Predicción de texto", "Un antivirus", "Un CPU"],
    c: 1
  },
  {
    q: "¿Qué significa LLM?",
    a: ["Large Language Model", "Low Logic Machine", "Linear Model", "Language Memory"],
    c: 0
  }
];

// ---------- DINÁMICAS ----------
function generateDynamicQuestions() {
  const concepts = [
    ["prompt", "instrucción al modelo"],
    ["fine-tuning", "entrenamiento adicional"],
    ["hallucination", "respuesta incorrecta inventada"],
    ["embedding", "representación vectorial"]
  ];

  return concepts.map(c => {
    const answers = [
      c[1],
      "Un hardware",
      "Un lenguaje de programación",
      "Un virus"
    ];

    const shuffled = shuffle(answers);

    return {
      q: `¿Qué significa "${c[0]}" en IA?`,
      a: shuffled,
      c: shuffled.indexOf(c[1])
    };
  });
}

// ---------- ESTADO ----------
let quiz = [];
let current = 0;
let score = 0;
let timeLeft = 10;
let timer;

// ---------- ELEMENTOS ----------
const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const feedbackEl = document.getElementById("feedback");
const scoreEl = document.getElementById("score");
const nextBtn = document.getElementById("nextBtn");
const progressBar = document.getElementById("progressBar");
const timerBar = document.getElementById("timerBar");
const timeEl = document.getElementById("time");

// ---------- INIT ----------
function initQuiz() {
  quiz = shuffle([...baseQuestions, ...generateDynamicQuestions()]);
  current = 0;
  score = 0;
  scoreEl.textContent = score;
  loadQuestion();
}

// ---------- LOAD ----------
function loadQuestion() {
  resetTimer();
  nextBtn.style.display = "none";
  answersEl.innerHTML = "";
  feedbackEl.innerHTML = "";

  const q = quiz[current];
  if (!q) return showResult();

  questionEl.textContent = q.q;
  progressBar.style.width = ((current / quiz.length) * 100) + "%";

  q.a.forEach((answer, index) => {
    const btn = document.createElement("button");
    btn.className = "btn btn-option";
    btn.textContent = answer;
    btn.onclick = () => selectAnswer(index);
    answersEl.appendChild(btn);
  });

  startTimer();
}

// ---------- TIMER ----------
function startTimer() {
  timeLeft = 10;
  timeEl.textContent = timeLeft;
  timerBar.style.width = "100%";

  timer = setInterval(() => {
    timeLeft--;
    timeEl.textContent = timeLeft;
    timerBar.style.width = (timeLeft * 10) + "%";

    if (timeLeft <= 0) {
      clearInterval(timer);
      autoFail();
    }
  }, 1000);
}

function resetTimer() {
  clearInterval(timer);
}

// ---------- RESPUESTAS ----------
function autoFail() {
  const q = quiz[current];
  showCorrectAnswer(q);
}

function selectAnswer(index) {
  clearInterval(timer);

  const q = quiz[current];
  const buttons = document.querySelectorAll(".btn-option");

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.c) b.classList.add("correct");
    if (i === index && i !== q.c) b.classList.add("incorrect");
  });

  if (index === q.c) {
    score++;
    feedbackEl.innerHTML = `<span class="correct-text">✔ Correcto</span>`;
  } else {
    showCorrectAnswer(q);
  }

  scoreEl.textContent = score;
  nextBtn.style.display = "block";
}

function showCorrectAnswer(q) {
  const buttons = document.querySelectorAll(".btn-option");

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.c) b.classList.add("correct");
  });

  feedbackEl.innerHTML = `❌ Incorrecto. Respuesta correcta: <b>${q.a[q.c]}</b>`;
  nextBtn.style.display = "block";
}

// ---------- NAV ----------
nextBtn.onclick = () => {
  current++;
  loadQuestion();
};

// ---------- RESULT ----------
function showResult() {
  progressBar.style.width = "100%";
  questionEl.textContent = "🎉 Fin del juego";
  answersEl.innerHTML = `
    <p>Tu puntaje: ${score} / ${quiz.length}</p>
    <button class="btn btn-success mt-2" onclick="initQuiz()">Reiniciar</button>
  `;
  feedbackEl.innerHTML = "";
  nextBtn.style.display = "none";
}

// ---------- START ----------
initQuiz();
</script>

</body>
</html>
